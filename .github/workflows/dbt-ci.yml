name: dbt CI/CD

on:
  push:
    branches:
      - dev  
  workflow_dispatch:  

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}
  
  GCP_TYPE: ${{ secrets.GCP_TYPE }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_PRIVATE_KEY_ID: ${{ secrets.GCP_PRIVATE_KEY_ID }}
  GCP_PRIVATE_KEY: ${{ secrets.GCP_PRIVATE_KEY }}
  GCP_CLIENT_EMAIL: ${{ secrets.GCP_CLIENT_EMAIL }}
  GCP_CLIENT_ID: ${{ secrets.GCP_CLIENT_ID }}
  GCP_AUTH_URI: ${{ secrets.GCP_AUTH_URI }}
  GCP_TOKEN_URI: ${{ secrets.GCP_TOKEN_URI }}
  GCP_AUTH_PROVIDER_X509_CERT_URL: ${{ secrets.GCP_AUTH_PROVIDER_X509_CERT_URL }}
  GCP_CLIENT_X509_CERT_URL: ${{ secrets.GCP_CLIENT_X509_CERT_URL }}

jobs:
  dbt-dev:
    name: "Build & Test on DEV"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Install dbt dependencies
        run: dbt deps

      - name: Debug dbt connection
        run: dbt debug --target dev

      - name: Run dbt build on DEV
        run: dbt build --target dev

  dbt-prod:
    name: "Deploy to PROD"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Install dbt dependencies
        run: dbt deps

      - name: Debug dbt connection
        run: dbt debug --target prod

      - name: Run dbt build on PROD
        run: dbt build --target prod
