version: 2

models:
  - name: int_sales_localbike__customer_orders
    description: '{{ doc("int_sales_localbike__customer_orders") }}'
    columns:
      - name: customer_id
        description: "Primary Key: Customer identifier."
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_sales_localbike__customer')
              field: customer_id

      - name: number_of_orders
        description: "Total number of orders by the customer."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: total_revenue
        description: "Total revenue generated by the customer."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: avg_order_value
        description: "Average order value for the customer."
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
