version: 2

models:
  - name: mrt_sales_localbike__stock_availability
    description: '{{ doc("mrt_sales_localbike__stock_availability") }}'
    columns:
      - name: store_id
        description: "Store identifier."
        tests:
          - not_null
      - name: product_id
        description: "Product identifier."
        tests:
          - not_null
      - name: quantity_available
        description: "Current quantity in stock for this product and store."
      - name: avg_weekly_sales
        description: "Average number of units sold per week."
      - name: stock_cover_days
        description: "Estimated days of stock coverage based on sales speed."
      - name: stock_status
        description: "Stock status: OK, Low Stock, or Critical."
        tests:
          - accepted_values:
              values: ['OK', 'Low Stock', 'Critical']
